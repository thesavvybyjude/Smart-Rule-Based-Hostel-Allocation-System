<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Hostels | Smart Hostel Allocation</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="navbar">
        <div class="container flex items-center justify-between">
            <a href="/index.html" class="brand">
                <i data-lucide="building-2"></i> AllocationSystem
            </a>
            <nav class="navbar-nav">
                <a href="/admin/dashboard.html" class="nav-link"><i data-lucide="layout-dashboard" class="icon-sm"></i> Dashboard</a>
                <a href="/admin/manage_hostels.html" class="nav-link active"><i data-lucide="building" class="icon-sm"></i> Hostels</a>
                <a href="/admin/manage_rooms.html" class="nav-link"><i data-lucide="door-open" class="icon-sm"></i> Rooms</a>
            </nav>
        </div>
    </header>
    
    <main class="container mt-32 mb-48">
        <div class="flex items-center justify-between mb-24">
            <div>
                <h2>Manage Hostels</h2>
                <p>Create and remove hostel blocks.</p>
            </div>
        </div>

        <div id="alertBox" class="alert hidden"></div>

        <div class="grid grid-cols-3 gap-24">
            <!-- Add Form -->
            <div class="card" style="align-self: start;">
                <h3 class="mb-16 flex items-center gap-8"><i data-lucide="plus-circle" class="icon-sm"></i> Add Hostel</h3>
                <form id="addHostelForm">
                    <div class="form-group">
                        <label class="form-label">Hostel Name</label>
                        <input type="text" id="h_name" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Gender Category</label>
                        <select id="h_gender" class="form-select" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Total Rooms (Estimate)</label>
                        <input type="number" id="h_rooms" class="form-input" required min="1">
                    </div>
                    <button type="submit" id="addBtn" class="btn btn-primary w-full mt-8">
                        <i data-lucide="save" class="icon-sm"></i> Save Hostel
                    </button>
                </form>
            </div>

            <!-- Table -->
            <div class="card" style="grid-column: span 2;">
                <div class="table-wrapper">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Hostel Name</th>
                                <th>Gender</th>
                                <th>Rooms Configured</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="hostelsBody">
                            <tr>
                                <td colspan="4" class="text-center py-24">
                                    <div class="empty-state" style="padding:var(--space-24);">
                                        <i data-lucide="loader-2" class="icon-lg" style="animation: spin 2s linear infinite;"></i>
                                        <p class="mt-8">Loading hostels...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from '/js/supabase-client.js';
        lucide.createIcons();

        const { data: { session } } = await supabase.auth.getSession();
        if (!session || session.user.email !== 'admin@hostel.com') window.location.href = '/index.html';

        const alertBox = document.getElementById('alertBox');
        function showAlert(msg, isError=true) {
            alertBox.classList.remove('hidden', 'alert-success', 'alert-error');
            alertBox.classList.add(isError ? 'alert-error' : 'alert-success');
            alertBox.innerHTML = `<i data-lucide="${isError ? 'alert-circle' : 'check-circle'}" class="icon-sm"></i> ${msg}`;
            lucide.createIcons();
        }

        async function loadHostels() {
            const { data, error } = await supabase.from('hostels').select('*').order('name');
            const tbody = document.getElementById('hostelsBody');
            
            if (error) {
                tbody.innerHTML = `<tr><td colspan="4" class="color-waitlisted text-center">Error: ${error.message}</td></tr>`;
                return;
            }
            if (data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4">
                            <div class="empty-state">
                                <i data-lucide="building"></i>
                                <h3>No Hostels Found</h3>
                                <p>Add a hostel using the form on the left to get started.</p>
                            </div>
                        </td>
                    </tr>
                `;
                lucide.createIcons();
                return;
            }

            tbody.innerHTML = '';
            data.forEach(h => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:500; color:var(--neutral-900);">${h.name}</td>
                    <td><span class="badge ${h.gender_category==='Male'?'badge-info':'badge-error'}">${h.gender_category}</span></td>
                    <td>${h.total_rooms}</td>
                    <td>
                        <button class="btn btn-danger-solid btn-sm" onclick="deleteHostel('${h.id}')">
                            <i data-lucide="trash-2" class="icon-sm"></i> Delete
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        document.getElementById('addHostelForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('addBtn');
            btn.disabled = true;

            const name = document.getElementById('h_name').value;
            const gender = document.getElementById('h_gender').value;
            const rooms = parseInt(document.getElementById('h_rooms').value);

            const { error } = await supabase.from('hostels').insert([{ name, gender_category: gender, total_rooms: rooms }]);
            if (error) {
                showAlert(error.message);
            } else {
                showAlert('Hostel added successfully', false);
                e.target.reset();
                loadHostels();
            }
            btn.disabled = false;
        });

        window.deleteHostel = async (id) => {
            if(!confirm('Are you sure you want to delete this hostel? All associated rooms will be removed.')) return;
            const { error } = await supabase.from('hostels').delete().eq('id', id);
            if(error) showAlert(error.message);
            else { showAlert('Hostel deleted successfully', false); loadHostels(); }
        }

        loadHostels();
    </script>
</body>
</html>
