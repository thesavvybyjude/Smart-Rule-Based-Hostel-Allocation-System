<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Feedback | Admin</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="main-header">
        <div class="container header-content">
            <a href="/index.html" class="logo">Hostel Allocation</a>
            <nav class="main-nav">
                <a href="/admin/dashboard.html">Dashboard</a>
                <a href="/admin/manage_feedback.html" style="font-weight:bold;">Feedback</a>
                <span class="nav-user">Welcome, Admin</span>
            </nav>
        </div>
    </header>
    
    <main class="container main-content">
        <div class="card">
            <h1>Student Feedback & Tickets</h1>
            <div id="alertBox" class="alert" style="display: none;"></div>

            <table class="data-table" style="margin-top: 20px;">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Student</th>
                        <th>Subject</th>
                        <th>Type</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="feedbackBody">
                    <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
        
        <!-- Simple modal to reply -->
        <div id="replyModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
            <div class="card" style="width: 500px; max-width: 90%;">
                <h2>Reply to Feedback</h2>
                <div id="fb-msg" style="margin-bottom: 15px; padding: 10px; background: #f1f5f9; border-radius: 5px;"></div>
                <textarea id="admin_response" rows="4" style="width:100%; margin-bottom:10px;" placeholder="Type your response here..."></textarea>
                <div style="display:flex; justify-content:flex-end; gap: 10px;">
                    <button class="btn" style="background:#64748b;" onclick="closeModal()">Cancel</button>
                    <button class="btn btn-primary" onclick="submitReply()">Send Reply & Resolve</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from '/js/supabase-client.js';

        const { data: { session } } = await supabase.auth.getSession();
        if (!session || session.user.email !== 'admin@hostel.com') window.location.href = '/index.html';

        let currentFbId = null;

        const alertBox = document.getElementById('alertBox');
        function showAlert(msg, isError=true) {
            alertBox.style.display = 'block';
            alertBox.className = `alert ${isError ? 'alert-error' : 'alert-success'}`;
            alertBox.textContent = msg;
        }

        async function loadFeedback() {
            const { data, error } = await supabase.from('feedback').select('*, students(fullname)').order('created_at', { ascending: false });
            const tbody = document.getElementById('feedbackBody');
            
            if (error) {
                tbody.innerHTML = `<tr><td colspan="6" style="color:red;">Error: ${error.message}</td></tr>`;
                return;
            }
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No feedback found.</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            data.forEach(f => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${new Date(f.created_at).toLocaleDateString()}</td>
                    <td>${f.students.fullname}</td>
                    <td>${f.subject}</td>
                    <td style="text-transform: capitalize;">${f.type}</td>
                    <td style="text-transform: capitalize; color: ${f.status === 'resolved' ? 'green' : 'orange'}">${f.status}</td>
                    <td>
                        <button class="btn btn-primary" style="padding: 5px 10px; font-size:0.8rem;" 
                            onclick="openReplyModal('${f.id}', '${f.message.replace(/'/g, "\\'")}')"
                            ${f.status === 'resolved' ? 'disabled' : ''}>
                            ${f.status === 'resolved' ? 'Resolved' : 'Reply'}
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.openReplyModal = (id, msg) => {
            currentFbId = id;
            document.getElementById('fb-msg').textContent = msg;
            document.getElementById('replyModal').style.display = 'flex';
        }

        window.closeModal = () => {
            document.getElementById('replyModal').style.display = 'none';
            currentFbId = null;
            document.getElementById('admin_response').value = '';
        }

        window.submitReply = async () => {
            const resp = document.getElementById('admin_response').value;
            if(!resp) { alert('Please enter a response.'); return; }
            
            const { error } = await supabase.from('feedback')
                .update({ admin_response: resp, status: 'resolved', updated_at: new Date().toISOString() })
                .eq('id', currentFbId);
                
            if(error) showAlert(error.message);
            else { showAlert('Reply sent successfully.', false); loadFeedback(); }
            
            closeModal();
        }

        loadFeedback();
    </script>
</body>
</html>
