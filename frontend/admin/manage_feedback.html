<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Feedback | Smart Hostel Allocation</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="navbar">
        <div class="container flex items-center justify-between">
            <a href="/index.html" class="brand">
                <i data-lucide="building-2"></i> AllocationSystem
            </a>
            <nav class="navbar-nav">
                <a href="/admin/dashboard.html" class="nav-link"><i data-lucide="layout-dashboard" class="icon-sm"></i> Dashboard</a>
                <a href="/admin/manage_feedback.html" class="nav-link active"><i data-lucide="message-square" class="icon-sm"></i> Feedback</a>
            </nav>
        </div>
    </header>
    
    <main class="container mt-32 mb-48">
        <div class="flex items-center justify-between mb-24">
            <div>
                <h2>Student Feedback & Tickets</h2>
                <p>Respond to issues, bugs, and suggestions from students.</p>
            </div>
        </div>

        <div id="alertBox" class="alert hidden"></div>

        <div class="card">
            <div class="table-wrapper">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Student</th>
                            <th>Subject</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="feedbackBody">
                        <tr>
                            <td colspan="6" class="text-center py-24">
                                <div class="empty-state" style="padding:var(--space-24);">
                                    <i data-lucide="loader-2" class="icon-lg" style="animation: spin 2s linear infinite;"></i>
                                    <p class="mt-8">Loading feedback...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Reply Modal -->
        <div id="replyModal" class="hidden flex items-center justify-center" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.6); z-index:100; backdrop-filter: blur(2px);">
            <div class="card" style="width: 500px; max-width: 90%; box-shadow: var(--shadow-lg);">
                <h3 class="mb-16 flex items-center gap-8"><i data-lucide="reply" class="icon-sm"></i> Reply to Feedback</h3>
                <div id="fb-msg" class="mb-16" style="padding:var(--space-12); background:var(--neutral-100); border-radius:var(--radius-md); font-size:var(--text-small); color:var(--neutral-700);"></div>
                <textarea id="admin_response" class="form-textarea w-full mb-16" placeholder="Type your response here..." required></textarea>
                <div class="flex justify-between gap-16">
                    <button class="btn btn-secondary w-full" onclick="closeModal()">Cancel</button>
                    <button class="btn btn-primary w-full" onclick="submitReply()">
                        <i data-lucide="send" class="icon-sm"></i> Resolve Ticket
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from '/js/supabase-client.js';
        lucide.createIcons();

        const { data: { session } } = await supabase.auth.getSession();
        if (!session || session.user.email !== 'admin@hostel.com') window.location.href = '/index.html';

        let currentFbId = null;

        const alertBox = document.getElementById('alertBox');
        function showAlert(msg, isError=true) {
            alertBox.classList.remove('hidden', 'alert-success', 'alert-error');
            alertBox.classList.add(isError ? 'alert-error' : 'alert-success');
            alertBox.innerHTML = `<i data-lucide="${isError ? 'alert-circle' : 'check-circle'}" class="icon-sm"></i> ${msg}`;
            lucide.createIcons();
        }

        async function loadFeedback() {
            const { data, error } = await supabase.from('feedback').select('*, students(fullname)').order('created_at', { ascending: false });
            const tbody = document.getElementById('feedbackBody');
            
            if (error) {
                tbody.innerHTML = `<tr><td colspan="6" class="color-waitlisted text-center">Error: ${error.message}</td></tr>`;
                return;
            }
            if (data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6">
                            <div class="empty-state">
                                <i data-lucide="inbox"></i>
                                <h3>No Feedback</h3>
                                <p>There are no open tickets or feedback from students.</p>
                            </div>
                        </td>
                    </tr>
                `;
                lucide.createIcons();
                return;
            }

            tbody.innerHTML = '';
            data.forEach(f => {
                let statusBadge = 'badge-neutral';
                if(f.status === 'resolved') statusBadge = 'badge-success';
                if(f.status === 'pending') statusBadge = 'badge-warning';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${new Date(f.created_at).toLocaleDateString()}</td>
                    <td style="font-weight:500; color:var(--neutral-900);">${f.students.fullname}</td>
                    <td>${f.subject}</td>
                    <td><span class="badge badge-neutral">${f.type}</span></td>
                    <td><span class="badge ${statusBadge}">${f.status}</span></td>
                    <td>
                        <button class="btn btn-secondary btn-sm" onclick="openReplyModal('${f.id}', '${f.message.replace(/'/g, "\\'")}')" ${f.status === 'resolved' ? 'disabled' : ''}>
                            <i data-lucide="${f.status === 'resolved' ? 'check' : 'reply'}" class="icon-sm"></i>
                            ${f.status === 'resolved' ? 'Resolved' : 'Reply'}
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        window.openReplyModal = (id, msg) => {
            currentFbId = id;
            document.getElementById('fb-msg').textContent = msg;
            document.getElementById('replyModal').classList.remove('hidden');
        }

        window.closeModal = () => {
            document.getElementById('replyModal').classList.add('hidden');
            currentFbId = null;
            document.getElementById('admin_response').value = '';
        }

        window.submitReply = async () => {
            const resp = document.getElementById('admin_response').value;
            if(!resp) { alert('Please enter a response.'); return; }
            
            const { error } = await supabase.from('feedback')
                .update({ admin_response: resp, status: 'resolved', updated_at: new Date().toISOString() })
                .eq('id', currentFbId);
                
            if(error) showAlert(error.message);
            else { showAlert('Reply sent successfully.', false); loadFeedback(); }
            
            closeModal();
        }

        loadFeedback();
    </script>
</body>
</html>
