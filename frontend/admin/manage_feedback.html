<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Feedback | Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-layout">
        
        <!-- Mobile Overlay -->
        <div class="mobile-overlay" id="mobileOverlay"></div>

        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <a href="/index.html" class="brand">
                <i data-lucide="building-2"></i> AllocationSystem
            </a>
            
            <nav class="sidebar-nav">
                <a href="/admin/dashboard.html" class="sidebar-link">
                    <i data-lucide="layout-dashboard" class="icon-md"></i> Dashboard
                </a>
                <a href="/admin/manage_hostels.html" class="sidebar-link">
                    <i data-lucide="building" class="icon-md"></i> Hostels
                </a>
                <a href="/admin/manage_rooms.html" class="sidebar-link">
                    <i data-lucide="door-open" class="icon-md"></i> Rooms
                </a>
                <a href="/admin/reports.html" class="sidebar-link">
                    <i data-lucide="bar-chart-3" class="icon-md"></i> Reports
                </a>
                <a href="/admin/manage_feedback.html" class="sidebar-link active">
                    <i data-lucide="message-square" class="icon-md"></i> Feedback
                </a>
            </nav>

            <div class="sidebar-bottom">
                <button id="logoutBtn" class="sidebar-link w-full" style="background:transparent; border:none; text-align:left; cursor:pointer;">
                    <i data-lucide="log-out" class="icon-md"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="main-wrapper">
            <!-- Mobile Header -->
            <header class="mobile-header">
                <div class="flex items-center gap-12">
                    <button id="menuToggleBtn" style="background:none; border:none; cursor:pointer;">
                        <i data-lucide="menu" class="icon-lg"></i>
                    </button>
                    <span style="font-weight:600; font-size:var(--text-h5);">Admin Portal</span>
                </div>
            </header>

            <main class="main-content">
                <div class="flex items-center justify-between mb-24">
                    <div>
                        <h2>Manage Feedback & Support</h2>
                        <p>Review and respond to student tickets and bug reports.</p>
                    </div>
                </div>

                <div id="alertBox" class="alert hidden"></div>

                <div class="grid gap-16" id="feedbackList">
                    <div class="card text-center py-24">
                        <div class="empty-state">
                            <i data-lucide="loader-2" class="icon-lg" style="animation: spin 2s linear infinite;"></i>
                            <p class="mt-8">Loading feedback tickets...</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { supabase } from '/js/supabase-client.mjs';
        lucide.createIcons();

        // Mobile Menu Toggle
        const menuBtn = document.getElementById('menuToggleBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobileOverlay');

        menuBtn.addEventListener('click', () => {
            sidebar.classList.add('open');
            overlay.classList.add('active');
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        });

        const { data: { session } } = await supabase.auth.getSession();
        if (!session || session.user.email !== 'admin@hostel.com') window.location.href = '/index.html';

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = '/login.html';
        });

        const alertBox = document.getElementById('alertBox');
        function showAlert(msg, isError=true) {
            alertBox.classList.remove('hidden', 'alert-success', 'alert-error');
            alertBox.classList.add(isError ? 'alert-error' : 'alert-success');
            alertBox.innerHTML = `<i data-lucide="${isError ? 'alert-circle' : 'check-circle'}" class="icon-sm"></i> ${msg}`;
            lucide.createIcons();
        }

        async function loadFeedback() {
            const { data, error } = await supabase.from('feedback')
                .select('*, students(fullname, email)')
                .order('created_at', { ascending: false });
                
            const list = document.getElementById('feedbackList');
            
            if (error) {
                list.innerHTML = `<div class="card" style="color:var(--error-text);">Error: ${error.message}. Ensure Admin RLS policies are set.</div>`;
                return;
            }

            if (data.length === 0) {
                list.innerHTML = `
                    <div class="card py-24 text-center">
                        <div class="empty-state">
                            <i data-lucide="inbox"></i>
                            <h3>No Feedback Found</h3>
                            <p>There are no active support tickets.</p>
                        </div>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            list.innerHTML = '';
            data.forEach(f => {
                let statusBadge = 'badge-neutral';
                if(f.status === 'resolved') statusBadge = 'badge-success';
                if(f.status === 'pending') statusBadge = 'badge-warning';

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-16 pb-16" style="border-bottom:1px solid var(--neutral-200);">
                        <div>
                            <h4 style="margin-bottom:var(--space-4);">${f.subject}</h4>
                            <div class="flex items-center gap-8 text-small" style="color:var(--neutral-500);">
                                <span class="badge badge-neutral">${f.type}</span>
                                <span><i data-lucide="user" class="icon-sm"></i> ${f.students ? f.students.fullname : 'Unknown'}</span>
                                <span>${new Date(f.created_at).toLocaleDateString()}</span>
                            </div>
                        </div>
                        <span class="badge ${statusBadge}">${f.status}</span>
                    </div>
                    
                    <div class="mb-16">
                        <p style="background:var(--neutral-50); padding:var(--space-16); border-radius:var(--radius-md); font-size:var(--text-small);">${f.message}</p>
                    </div>

                    ${f.admin_response ? `
                    <div class="mb-16">
                        <span class="form-label mb-4" style="display:block; color:var(--primary-700);">Your Response</span>
                        <p style="background:var(--primary-50); border:1px solid var(--primary-100); padding:var(--space-12); border-radius:var(--radius-md); font-size:var(--text-small); color:var(--primary-900);">
                            ${f.admin_response}
                        </p>
                    </div>
                    ` : `
                    <div class="mt-16 pt-16" style="border-top:1px solid var(--neutral-200);">
                        <textarea id="reply-${f.id}" class="form-input mb-8" placeholder="Type your response to the student..." rows="2"></textarea>
                        <div class="flex justify-end gap-8">
                            <button class="btn btn-secondary" onclick="updateStatus('${f.id}', 'resolved')">
                                <i data-lucide="check" class="icon-sm"></i> Mark Resolved
                            </button>
                            <button class="btn btn-primary" onclick="sendReply('${f.id}')">
                                <i data-lucide="send" class="icon-sm"></i> Send Reply
                            </button>
                        </div>
                    </div>
                    `}
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        window.updateStatus = async (id, status) => {
            const { error } = await supabase.from('feedback').update({ status }).eq('id', id);
            if (error) showAlert(error.message);
            else {
                showAlert('Status updated!', false);
                loadFeedback();
            }
        };

        window.sendReply = async (id) => {
            const reply = document.getElementById(`reply-${id}`).value;
            if (!reply) return showAlert('Please enter a response.');

            const { error } = await supabase.from('feedback').update({ 
                admin_response: reply,
                status: 'acknowledged'
            }).eq('id', id);

            if (error) showAlert(error.message);
            else {
                showAlert('Response sent successfully!', false);
                loadFeedback();
            }
        };

        loadFeedback();
    </script>
</body>
</html>
