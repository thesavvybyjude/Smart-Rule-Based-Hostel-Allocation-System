<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | Admin</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="main-header">
        <div class="container header-content">
            <a href="/index.html" class="logo">Hostel Allocation</a>
            <nav class="main-nav">
                <a href="/admin/dashboard.html">Dashboard</a>
                <a href="/admin/reports.html" style="font-weight:bold;">Reports</a>
                <span class="nav-user">Welcome, Admin</span>
            </nav>
        </div>
    </header>
    
    <main class="container main-content">
        <div class="card">
            <h1>Allocation Reports</h1>
            <p>Overview of the current system allocations and waitlists.</p>
            
            <div id="alertBox" class="alert" style="display: none;"></div>

            <div style="display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap;">
                <div style="flex: 1; background: #f8fafc; padding: 15px; border-radius: 5px;">
                    <h3>Allocated Students</h3>
                    <div id="stat-allocated" style="font-size: 2rem; font-weight: bold; color: #16a34a;">0</div>
                </div>
                <div style="flex: 1; background: #f8fafc; padding: 15px; border-radius: 5px;">
                    <h3>Waitlisted Students</h3>
                    <div id="stat-waitlisted" style="font-size: 2rem; font-weight: bold; color: #dc2626;">0</div>
                </div>
                <div style="flex: 1; background: #f8fafc; padding: 15px; border-radius: 5px;">
                    <h3>Pending Requests</h3>
                    <div id="stat-pending" style="font-size: 2rem; font-weight: bold; color: #ca8a04;">0</div>
                </div>
            </div>

            <h3 style="margin-top: 30px;">Detailed Student List</h3>
            <div style="margin-bottom: 10px;">
                <label>Filter by status: </label>
                <select id="statusFilter" onchange="loadStudents()">
                    <option value="">All</option>
                    <option value="allocated">Allocated</option>
                    <option value="waitlisted">Waitlisted</option>
                    <option value="pending">Pending</option>
                </select>
            </div>
            
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Gender</th>
                        <th>Level</th>
                        <th>Medical</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="studentsBody">
                    <tr><td colspan="5" style="text-align:center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { supabase } from '/js/supabase-client.js';

        const { data: { session } } = await supabase.auth.getSession();
        if (!session || session.user.email !== 'admin@hostel.com') window.location.href = '/index.html';

        async function loadStudents() {
            const filter = document.getElementById('statusFilter').value;
            let query = supabase.from('students').select('*').order('created_at', { ascending: false });
            if (filter) {
                query = query.eq('allocation_status', filter);
            }

            const { data, error } = await query;
            const tbody = document.getElementById('studentsBody');
            
            if (error) {
                tbody.innerHTML = `<tr><td colspan="5" style="color:red;">Error: ${error.message}</td></tr>`;
                return;
            }

            // Also calculate stats if filter is "All"
            if (!filter) {
                document.getElementById('stat-allocated').textContent = data.filter(s => s.allocation_status === 'allocated').length;
                document.getElementById('stat-waitlisted').textContent = data.filter(s => s.allocation_status === 'waitlisted').length;
                document.getElementById('stat-pending').textContent = data.filter(s => s.allocation_status === 'pending').length;
            }

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No students found.</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            data.forEach(s => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${s.fullname}</td>
                    <td>${s.gender}</td>
                    <td>${s.level}</td>
                    <td>${s.medical_status ? 'Yes' : 'No'}</td>
                    <td style="text-transform: capitalize;">${s.allocation_status}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.loadStudents = loadStudents;
        loadStudents();
    </script>
</body>
</html>
