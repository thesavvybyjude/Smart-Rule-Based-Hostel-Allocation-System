<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-layout">
        
        <!-- Mobile Overlay -->
        <div class="mobile-overlay" id="mobileOverlay"></div>

        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <a href="/index.html" class="brand">
                <i data-lucide="building-2"></i> AllocationSystem
            </a>
            
            <nav class="sidebar-nav">
                <a href="/admin/dashboard.html" class="sidebar-link">
                    <i data-lucide="layout-dashboard" class="icon-md"></i> Dashboard
                </a>
                <a href="/admin/manage_hostels.html" class="sidebar-link">
                    <i data-lucide="building" class="icon-md"></i> Hostels
                </a>
                <a href="/admin/manage_rooms.html" class="sidebar-link">
                    <i data-lucide="door-open" class="icon-md"></i> Rooms
                </a>
                <a href="/admin/reports.html" class="sidebar-link active">
                    <i data-lucide="bar-chart-3" class="icon-md"></i> Reports
                </a>
                <a href="/admin/manage_feedback.html" class="sidebar-link">
                    <i data-lucide="message-square" class="icon-md"></i> Feedback
                </a>
            </nav>

            <div class="sidebar-bottom">
                <button id="logoutBtn" class="sidebar-link w-full" style="background:transparent; border:none; text-align:left; cursor:pointer;">
                    <i data-lucide="log-out" class="icon-md"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="main-wrapper">
            <!-- Mobile Header -->
            <header class="mobile-header">
                <div class="flex items-center gap-12">
                    <button id="menuToggleBtn" style="background:none; border:none; cursor:pointer;">
                        <i data-lucide="menu" class="icon-lg"></i>
                    </button>
                    <span style="font-weight:600; font-size:var(--text-h5);">Admin Portal</span>
                </div>
            </header>

            <main class="main-content">
                <div class="flex items-center justify-between mb-24">
                    <div>
                        <h2>Allocation Reports</h2>
                        <p>Detailed view of all students and their allocation status.</p>
                    </div>
                </div>

                <div class="card mb-24 flex items-center gap-16">
                    <div class="flex-1">
                        <input type="text" id="searchInput" class="form-input" placeholder="Search by name or email..." style="margin:0;">
                    </div>
                    <select id="statusFilter" class="form-input w-auto" style="margin:0;">
                        <option value="all">All Statuses</option>
                        <option value="allocated">Allocated</option>
                        <option value="pending">Pending</option>
                        <option value="waitlisted">Waitlisted</option>
                        <option value="not_requested">Not Requested</option>
                    </select>
                </div>

                <div class="card">
                    <div class="table-container">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Student Name</th>
                                    <th>Level</th>
                                    <th>Gender</th>
                                    <th>Medical</th>
                                    <th>Status</th>
                                    <th>Room / Hostel</th>
                                </tr>
                            </thead>
                            <tbody id="reportsList">
                                <tr>
                                    <td colspan="6" class="text-center py-24">
                                        <div class="empty-state">
                                            <i data-lucide="loader-2" class="icon-lg" style="animation: spin 2s linear infinite;"></i>
                                            <p class="mt-8">Loading reports...</p>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { supabase } from '/js/supabase-client.js';
        lucide.createIcons();

        // Mobile Menu Toggle
        const menuBtn = document.getElementById('menuToggleBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobileOverlay');

        menuBtn.addEventListener('click', () => {
            sidebar.classList.add('open');
            overlay.classList.add('active');
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        });

        const { data: { session } } = await supabase.auth.getSession();
        if (!session || session.user.email !== 'admin@hostel.com') window.location.href = '/index.html';

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = '/login.html';
        });

        let allData = [];

        async function loadReports() {
            const { data: students, error: err1 } = await supabase.from('students').select('*').order('created_at', { ascending: false });
            const { data: allocations, error: err2 } = await supabase.from('allocations').select('student_id, rooms(room_number, hostels(name))');
            
            if (err1 || err2) {
                document.getElementById('reportsList').innerHTML = `<tr><td colspan="6" class="text-center" style="color:var(--error-text);">Failed to load reports. Ensure Admin RLS policies are set!</td></tr>`;
                return;
            }

            allData = students.map(s => {
                const alloc = allocations.find(a => a.student_id === s.id);
                let roomInfo = '-';
                if(alloc && alloc.rooms) {
                    roomInfo = `Room ${alloc.rooms.room_number} (${alloc.rooms.hostels?.name || 'Unknown'})`;
                }
                return { ...s, roomInfo };
            });

            renderTable(allData);
        }

        function renderTable(data) {
            const tbody = document.getElementById('reportsList');
            
            if(data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center py-24">
                            <div class="empty-state">
                                <i data-lucide="search-x"></i>
                                <h3>No Students Found</h3>
                                <p>No records match your filters.</p>
                            </div>
                        </td>
                    </tr>
                `;
                lucide.createIcons();
                return;
            }

            tbody.innerHTML = '';
            data.forEach(s => {
                let badgeClass = 'badge-neutral';
                if (s.allocation_status === 'allocated') badgeClass = 'badge-success';
                else if (s.allocation_status === 'pending') badgeClass = 'badge-warning';
                else if (s.allocation_status === 'waitlisted') badgeClass = 'badge-error';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div style="font-weight:600; color:var(--neutral-900);">${s.fullname}</div>
                        <div class="text-small" style="color:var(--neutral-500);">${s.email}</div>
                    </td>
                    <td>${s.level}</td>
                    <td><span class="badge ${s.gender === 'Male' ? 'badge-primary' : 'badge-warning'}">${s.gender}</span></td>
                    <td>
                        ${s.medical_status 
                            ? '<span class="badge badge-error"><i data-lucide="heart-pulse" class="icon-sm"></i> Yes</span>' 
                            : '<span style="color:var(--neutral-400);">No</span>'}
                    </td>
                    <td><span class="badge ${badgeClass}">${s.allocation_status.replace('_', ' ')}</span></td>
                    <td style="font-weight:500;">${s.roomInfo}</td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        function filterData() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;

            const filtered = allData.filter(s => {
                const matchesSearch = s.fullname.toLowerCase().includes(q) || s.email.toLowerCase().includes(q);
                const matchesStatus = status === 'all' || s.allocation_status === status;
                return matchesSearch && matchesStatus;
            });
            renderTable(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', filterData);
        document.getElementById('statusFilter').addEventListener('change', filterData);

        loadReports();
    </script>
</body>
</html>
