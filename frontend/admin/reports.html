<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allocation Reports | Smart Hostel Allocation</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="navbar">
        <div class="container flex items-center justify-between">
            <a href="/index.html" class="brand">
                <i data-lucide="building-2"></i> AllocationSystem
            </a>
            <nav class="navbar-nav">
                <a href="/admin/dashboard.html" class="nav-link"><i data-lucide="layout-dashboard" class="icon-sm"></i> Dashboard</a>
                <a href="/admin/reports.html" class="nav-link active"><i data-lucide="bar-chart-3" class="icon-sm"></i> Reports</a>
            </nav>
        </div>
    </header>
    
    <main class="container mt-32 mb-48">
        <div class="flex items-center justify-between mb-24">
            <div>
                <h2>Allocation Reports</h2>
                <p>Overview of the current system allocations and waitlists.</p>
            </div>
            <button class="btn btn-secondary" onclick="window.print()">
                <i data-lucide="printer" class="icon-sm"></i> Print Report
            </button>
        </div>

        <div id="alertBox" class="alert hidden"></div>

        <div class="grid grid-cols-3 gap-16 mb-32">
            <div class="card stat-card">
                <div class="flex justify-between items-center">
                    <span class="stat-title">Allocated Students</span>
                    <i data-lucide="check-circle-2" class="icon-md" style="color:var(--success-text)"></i>
                </div>
                <span class="stat-value" id="stat-allocated">--</span>
            </div>
            <div class="card stat-card">
                <div class="flex justify-between items-center">
                    <span class="stat-title">Waitlisted Students</span>
                    <i data-lucide="alert-circle" class="icon-md" style="color:var(--error-text)"></i>
                </div>
                <span class="stat-value" id="stat-waitlisted">--</span>
            </div>
            <div class="card stat-card">
                <div class="flex justify-between items-center">
                    <span class="stat-title">Pending Requests</span>
                    <i data-lucide="clock" class="icon-md" style="color:var(--warning-text)"></i>
                </div>
                <span class="stat-value" id="stat-pending">--</span>
            </div>
        </div>

        <div class="card">
            <div class="flex items-center justify-between mb-16">
                <h3>Detailed Student Roster</h3>
                <div class="flex items-center gap-8">
                    <label class="form-label mb-0">Filter by status:</label>
                    <select id="statusFilter" class="form-select" onchange="loadStudents()" style="width:150px; height:32px; padding:0 8px;">
                        <option value="">All Students</option>
                        <option value="allocated">Allocated</option>
                        <option value="waitlisted">Waitlisted</option>
                        <option value="pending">Pending</option>
                    </select>
                </div>
            </div>
            
            <div class="table-wrapper">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Gender</th>
                            <th>Level</th>
                            <th>Medical Priority</th>
                            <th>Allocation Status</th>
                        </tr>
                    </thead>
                    <tbody id="studentsBody">
                        <tr>
                            <td colspan="5" class="text-center py-24">
                                <div class="empty-state" style="padding:var(--space-24);">
                                    <i data-lucide="loader-2" class="icon-lg" style="animation: spin 2s linear infinite;"></i>
                                    <p class="mt-8">Loading reports...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from '/js/supabase-client.js';
        lucide.createIcons();

        const { data: { session } } = await supabase.auth.getSession();
        if (!session || session.user.email !== 'admin@hostel.com') window.location.href = '/index.html';

        async function loadStudents() {
            const filter = document.getElementById('statusFilter').value;
            let query = supabase.from('students').select('*').order('created_at', { ascending: false });
            if (filter) {
                query = query.eq('allocation_status', filter);
            }

            const { data, error } = await query;
            const tbody = document.getElementById('studentsBody');
            
            if (error) {
                tbody.innerHTML = `<tr><td colspan="5" class="color-waitlisted text-center">Error: ${error.message}</td></tr>`;
                return;
            }

            if (!filter) {
                document.getElementById('stat-allocated').textContent = data.filter(s => s.allocation_status === 'allocated').length;
                document.getElementById('stat-waitlisted').textContent = data.filter(s => s.allocation_status === 'waitlisted').length;
                document.getElementById('stat-pending').textContent = data.filter(s => s.allocation_status === 'pending').length;
            }

            if (data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <i data-lucide="users"></i>
                                <h3>No Students Found</h3>
                                <p>There are no students matching this filter.</p>
                            </div>
                        </td>
                    </tr>
                `;
                lucide.createIcons();
                return;
            }

            tbody.innerHTML = '';
            data.forEach(s => {
                let badgeClass = 'badge-neutral';
                if (s.allocation_status === 'allocated') badgeClass = 'badge-success';
                if (s.allocation_status === 'pending') badgeClass = 'badge-warning';
                if (s.allocation_status === 'waitlisted') badgeClass = 'badge-error';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:500; color:var(--neutral-900);">${s.fullname}</td>
                    <td>${s.gender}</td>
                    <td>${s.level} Level</td>
                    <td>${s.medical_status ? '<span class="badge badge-error"><i data-lucide="plus" class="icon-sm" style="margin-right:2px;"></i> Priority</span>' : '<span class="color-not_requested">No</span>'}</td>
                    <td><span class="badge ${badgeClass}">${s.allocation_status}</span></td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        window.loadStudents = loadStudents;
        loadStudents();
    </script>
</body>
</html>
