<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Smart Hostel Allocation</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="navbar">
        <div class="container flex items-center justify-between">
            <a href="/index.html" class="brand">
                <i data-lucide="building-2"></i> AllocationSystem
            </a>
            <nav class="navbar-nav">
                <a href="/admin/dashboard.html" class="nav-link active"><i data-lucide="layout-dashboard" class="icon-sm"></i> Dashboard</a>
                <a href="/admin/manage_hostels.html" class="nav-link"><i data-lucide="building" class="icon-sm"></i> Hostels</a>
                <a href="/admin/manage_rooms.html" class="nav-link"><i data-lucide="door-open" class="icon-sm"></i> Rooms</a>
                <span class="nav-link" style="color:var(--neutral-400);">|</span>
                <button id="logoutBtn" class="btn btn-secondary btn-sm"><i data-lucide="log-out" class="icon-sm"></i> Logout</button>
            </nav>
        </div>
    </header>
    
    <main class="container mt-32 mb-48">
        <div class="flex items-center justify-between mb-24">
            <div>
                <h2>Admin Dashboard</h2>
                <p>Manage hostel operations and allocations.</p>
            </div>
            <button id="runAllocationBtn" class="btn btn-primary">
                <i data-lucide="play" class="icon-sm"></i> Run Allocation Engine
            </button>
        </div>

        <div id="alertBox" class="alert hidden"></div>

        <div class="grid grid-cols-4 gap-16 mb-32">
            <div class="card stat-card">
                <div class="flex justify-between items-center">
                    <span class="stat-title">Total Hostels</span>
                    <i data-lucide="building" class="icon-md" style="color:var(--primary-500)"></i>
                </div>
                <span class="stat-value" id="statHostels">--</span>
            </div>
            <div class="card stat-card">
                <div class="flex justify-between items-center">
                    <span class="stat-title">Total Rooms</span>
                    <i data-lucide="door-open" class="icon-md" style="color:var(--primary-500)"></i>
                </div>
                <span class="stat-value" id="statRooms">--</span>
            </div>
            <div class="card stat-card">
                <div class="flex justify-between items-center">
                    <span class="stat-title">Pending Students</span>
                    <i data-lucide="users" class="icon-md" style="color:var(--warning-text)"></i>
                </div>
                <span class="stat-value" id="statPending">--</span>
            </div>
            <div class="card stat-card">
                <div class="flex justify-between items-center">
                    <span class="stat-title">Allocated</span>
                    <i data-lucide="check-circle-2" class="icon-md" style="color:var(--success-text)"></i>
                </div>
                <span class="stat-value" id="statAllocated">--</span>
            </div>
        </div>

        <h3>Quick Actions</h3>
        <p>Navigate to specific management modules.</p>
        
        <div class="grid grid-cols-4 gap-16 mt-16">
            <a href="/admin/manage_hostels.html" class="card flex flex-col items-center justify-center gap-8 text-center hover:bg-neutral-50 transition" style="text-decoration:none;">
                <div style="background:var(--primary-50); padding:12px; border-radius:50%;">
                    <i data-lucide="building" class="icon-lg" style="color:var(--primary-600)"></i>
                </div>
                <span style="font-weight:600; color:var(--neutral-800);">Manage Hostels</span>
            </a>
            
            <a href="/admin/manage_rooms.html" class="card flex flex-col items-center justify-center gap-8 text-center hover:bg-neutral-50 transition" style="text-decoration:none;">
                <div style="background:var(--primary-50); padding:12px; border-radius:50%;">
                    <i data-lucide="door-open" class="icon-lg" style="color:var(--primary-600)"></i>
                </div>
                <span style="font-weight:600; color:var(--neutral-800);">Manage Rooms</span>
            </a>
            
            <a href="/admin/reports.html" class="card flex flex-col items-center justify-center gap-8 text-center hover:bg-neutral-50 transition" style="text-decoration:none;">
                <div style="background:var(--info-bg); padding:12px; border-radius:50%;">
                    <i data-lucide="bar-chart-3" class="icon-lg" style="color:var(--info-text)"></i>
                </div>
                <span style="font-weight:600; color:var(--neutral-800);">View Reports</span>
            </a>
            
            <a href="/admin/manage_feedback.html" class="card flex flex-col items-center justify-center gap-8 text-center hover:bg-neutral-50 transition" style="text-decoration:none;">
                <div style="background:var(--warning-bg); padding:12px; border-radius:50%;">
                    <i data-lucide="message-square" class="icon-lg" style="color:var(--warning-text)"></i>
                </div>
                <span style="font-weight:600; color:var(--neutral-800);">View Feedback</span>
            </a>
        </div>
    </main>

    <script type="module">
        import { supabase } from '/js/supabase-client.js';
        lucide.createIcons();

        const { data: { session } } = await supabase.auth.getSession();
        if (!session || session.user.email !== 'admin@hostel.com') window.location.href = '/index.html';

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = '/login.html';
        });

        const alertBox = document.getElementById('alertBox');
        function showAlert(msg, isError=true) {
            alertBox.classList.remove('hidden', 'alert-success', 'alert-error');
            alertBox.classList.add(isError ? 'alert-error' : 'alert-success');
            alertBox.innerHTML = `<i data-lucide="${isError ? 'alert-circle' : 'check-circle'}" class="icon-sm"></i> ${msg}`;
            lucide.createIcons();
        }

        async function loadStats() {
            const { count: hostels } = await supabase.from('hostels').select('*', { count: 'exact', head: true });
            document.getElementById('statHostels').textContent = hostels || 0;

            const { count: rooms } = await supabase.from('rooms').select('*', { count: 'exact', head: true });
            document.getElementById('statRooms').textContent = rooms || 0;

            const { count: pending } = await supabase.from('students').select('*', { count: 'exact', head: true }).eq('allocation_status', 'pending');
            document.getElementById('statPending').textContent = pending || 0;

            const { count: allocated } = await supabase.from('students').select('*', { count: 'exact', head: true }).eq('allocation_status', 'allocated');
            document.getElementById('statAllocated').textContent = allocated || 0;
        }

        document.getElementById('runAllocationBtn').addEventListener('click', async () => {
            const btn = document.getElementById('runAllocationBtn');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="icon-sm" style="animation: spin 2s linear infinite;"></i> Running Engine...`;
            lucide.createIcons();
            
            try {
                const res = await fetch('/api/allocation/run', { method: 'POST' });
                const data = await res.json();
                
                if (res.ok) {
                    showAlert(data.message, false);
                    loadStats();
                } else {
                    showAlert(data.error || 'Allocation failed');
                }
            } catch(e) {
                showAlert('Network error occurred.');
            }
            
            btn.disabled = false;
            btn.innerHTML = `<i data-lucide="play" class="icon-sm"></i> Run Allocation Engine`;
            lucide.createIcons();
        });

        loadStats();
    </script>
</body>
</html>
