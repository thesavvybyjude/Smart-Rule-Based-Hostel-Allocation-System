<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Rooms | Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-layout">
        
        <!-- Mobile Overlay -->
        <div class="mobile-overlay" id="mobileOverlay"></div>

        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <a href="/index.html" class="brand">
                <i data-lucide="building-2"></i> AllocationSystem
            </a>
            
            <nav class="sidebar-nav">
                <a href="/admin/dashboard.html" class="sidebar-link">
                    <i data-lucide="layout-dashboard" class="icon-md"></i> Dashboard
                </a>
                <a href="/admin/manage_hostels.html" class="sidebar-link">
                    <i data-lucide="building" class="icon-md"></i> Hostels
                </a>
                <a href="/admin/manage_rooms.html" class="sidebar-link active">
                    <i data-lucide="door-open" class="icon-md"></i> Rooms
                </a>
                <a href="/admin/reports.html" class="sidebar-link">
                    <i data-lucide="bar-chart-3" class="icon-md"></i> Reports
                </a>
                <a href="/admin/manage_feedback.html" class="sidebar-link">
                    <i data-lucide="message-square" class="icon-md"></i> Feedback
                </a>
            </nav>

            <div class="sidebar-bottom">
                <button id="logoutBtn" class="sidebar-link w-full" style="background:transparent; border:none; text-align:left; cursor:pointer;">
                    <i data-lucide="log-out" class="icon-md"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="main-wrapper">
            <!-- Mobile Header -->
            <header class="mobile-header">
                <div class="flex items-center gap-12">
                    <button id="menuToggleBtn" style="background:none; border:none; cursor:pointer;">
                        <i data-lucide="menu" class="icon-lg"></i>
                    </button>
                    <span style="font-weight:600; font-size:var(--text-h5);">Admin Portal</span>
                </div>
            </header>

            <main class="main-content">
                <div class="flex items-center justify-between mb-24">
                    <div>
                        <h2>Manage Rooms</h2>
                        <p>Configure individual rooms within hostels.</p>
                    </div>
                </div>

                <div id="alertBox" class="alert hidden"></div>

                <div class="grid grid-cols-3 gap-24 items-start">
                    <!-- Form -->
                    <div class="card" style="grid-column: span 1;">
                        <h3 class="mb-16">Add New Room</h3>
                        <form id="roomForm">
                            <div class="form-group">
                                <label class="form-label">Hostel</label>
                                <select id="hostelSelect" class="form-input" required>
                                    <option value="">Loading...</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Room Number</label>
                                <input type="text" id="roomNumber" class="form-input" required placeholder="e.g. 101">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Capacity</label>
                                <input type="number" id="capacity" class="form-input" required min="1" max="10">
                            </div>
                            <button type="submit" class="btn btn-primary w-full">
                                <i data-lucide="plus" class="icon-sm"></i> Add Room
                            </button>
                        </form>
                    </div>

                    <!-- List -->
                    <div class="card" style="grid-column: span 2;">
                        <h3 class="mb-16">Room Directory</h3>
                        <div class="table-container">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>Hostel</th>
                                        <th>Room No</th>
                                        <th>Capacity</th>
                                        <th>Occupied</th>
                                        <th class="text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="roomList">
                                    <tr>
                                        <td colspan="5" class="text-center py-24">
                                            <div class="empty-state">
                                                <i data-lucide="loader-2" class="icon-lg" style="animation: spin 2s linear infinite;"></i>
                                                <p class="mt-8">Loading rooms...</p>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { supabase } from '/js/supabase-client.js';
        lucide.createIcons();

        // Mobile Menu Toggle
        const menuBtn = document.getElementById('menuToggleBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobileOverlay');

        menuBtn.addEventListener('click', () => {
            sidebar.classList.add('open');
            overlay.classList.add('active');
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        });

        const { data: { session } } = await supabase.auth.getSession();
        if (!session || session.user.email !== 'admin@hostel.com') window.location.href = '/index.html';

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = '/login.html';
        });

        const alertBox = document.getElementById('alertBox');
        function showAlert(msg, isError=true) {
            alertBox.classList.remove('hidden', 'alert-success', 'alert-error');
            alertBox.classList.add(isError ? 'alert-error' : 'alert-success');
            alertBox.innerHTML = `<i data-lucide="${isError ? 'alert-circle' : 'check-circle'}" class="icon-sm"></i> ${msg}`;
            lucide.createIcons();
        }

        async function loadDropdown() {
            const { data } = await supabase.from('hostels').select('id, name').order('name');
            const select = document.getElementById('hostelSelect');
            select.innerHTML = '<option value="">Select Hostel</option>';
            if(data) {
                data.forEach(h => {
                    select.innerHTML += `<option value="${h.id}">${h.name}</option>`;
                });
            }
        }

        async function loadRooms() {
            const { data, error } = await supabase.from('rooms').select('*, hostels(name)').order('room_number');
            const tbody = document.getElementById('roomList');
            
            if (error) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center" style="color:var(--error-text);">Failed to load rooms</td></tr>`;
                return;
            }

            if(data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center py-24">
                            <div class="empty-state">
                                <i data-lucide="door-open"></i>
                                <h3>No Rooms Found</h3>
                                <p>Add a room using the form on the left.</p>
                            </div>
                        </td>
                    </tr>
                `;
                lucide.createIcons();
                return;
            }

            tbody.innerHTML = '';
            data.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:500;">${r.hostels ? r.hostels.name : 'Unknown'}</td>
                    <td>${r.room_number}</td>
                    <td>${r.capacity}</td>
                    <td><span class="badge ${r.occupied_slots >= r.capacity ? 'badge-error' : 'badge-neutral'}">${r.occupied_slots} / ${r.capacity}</span></td>
                    <td class="text-right">
                        <button class="btn btn-danger" onclick="deleteRoom('${r.id}')" style="padding:var(--space-8); height:auto;">
                            <i data-lucide="trash-2" class="icon-sm"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        document.getElementById('roomForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const hostel_id = document.getElementById('hostelSelect').value;
            const room_number = document.getElementById('roomNumber').value;
            const capacity = document.getElementById('capacity').value;

            if(!hostel_id) return showAlert('Please select a hostel');

            const { error } = await supabase.from('rooms').insert([{ hostel_id, room_number, capacity }]);
            if (error) showAlert(error.message);
            else {
                showAlert('Room added successfully', false);
                document.getElementById('roomForm').reset();
                loadRooms();
            }
        });

        window.deleteRoom = async (id) => {
            if(!confirm('Are you sure?')) return;
            const { error } = await supabase.from('rooms').delete().eq('id', id);
            if (error) showAlert(error.message);
            else {
                showAlert('Room deleted', false);
                loadRooms();
            }
        };

        loadDropdown();
        loadRooms();
    </script>
</body>
</html>
