<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Rooms | Smart Hostel Allocation</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="navbar">
        <div class="container flex items-center justify-between">
            <a href="/index.html" class="brand">
                <i data-lucide="building-2"></i> AllocationSystem
            </a>
            <nav class="navbar-nav">
                <a href="/admin/dashboard.html" class="nav-link"><i data-lucide="layout-dashboard" class="icon-sm"></i> Dashboard</a>
                <a href="/admin/manage_hostels.html" class="nav-link"><i data-lucide="building" class="icon-sm"></i> Hostels</a>
                <a href="/admin/manage_rooms.html" class="nav-link active"><i data-lucide="door-open" class="icon-sm"></i> Rooms</a>
            </nav>
        </div>
    </header>
    
    <main class="container mt-32 mb-48">
        <div class="flex items-center justify-between mb-24">
            <div>
                <h2>Manage Rooms</h2>
                <p>Configure room capacities for specific hostels.</p>
            </div>
        </div>

        <div id="alertBox" class="alert hidden"></div>

        <div class="grid grid-cols-3 gap-24">
            <!-- Add Form -->
            <div class="card" style="align-self: start;">
                <h3 class="mb-16 flex items-center gap-8"><i data-lucide="plus-circle" class="icon-sm"></i> Add Room</h3>
                <form id="addRoomForm">
                    <div class="form-group">
                        <label class="form-label">Hostel</label>
                        <select id="r_hostel" class="form-select" required></select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Room Number</label>
                        <input type="text" id="r_number" class="form-input" placeholder="e.g. A101" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Capacity</label>
                        <input type="number" id="r_capacity" class="form-input" required min="1" value="4">
                    </div>
                    <button type="submit" id="addBtn" class="btn btn-primary w-full mt-8">
                        <i data-lucide="save" class="icon-sm"></i> Save Room
                    </button>
                </form>
            </div>

            <!-- Table -->
            <div class="card" style="grid-column: span 2;">
                <div class="table-wrapper">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Hostel</th>
                                <th>Room No</th>
                                <th>Capacity</th>
                                <th>Occupied</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="roomsBody">
                            <tr>
                                <td colspan="5" class="text-center py-24">
                                    <div class="empty-state" style="padding:var(--space-24);">
                                        <i data-lucide="loader-2" class="icon-lg" style="animation: spin 2s linear infinite;"></i>
                                        <p class="mt-8">Loading rooms...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from '/js/supabase-client.js';
        lucide.createIcons();

        const { data: { session } } = await supabase.auth.getSession();
        if (!session || session.user.email !== 'admin@hostel.com') window.location.href = '/index.html';

        const alertBox = document.getElementById('alertBox');
        function showAlert(msg, isError=true) {
            alertBox.classList.remove('hidden', 'alert-success', 'alert-error');
            alertBox.classList.add(isError ? 'alert-error' : 'alert-success');
            alertBox.innerHTML = `<i data-lucide="${isError ? 'alert-circle' : 'check-circle'}" class="icon-sm"></i> ${msg}`;
            lucide.createIcons();
        }

        async function init() {
            const { data: hostels } = await supabase.from('hostels').select('id, name').order('name');
            const select = document.getElementById('r_hostel');
            select.innerHTML = '<option value="">-- Select Hostel --</option>';
            if(hostels) {
                hostels.forEach(h => select.innerHTML += `<option value="${h.id}">${h.name}</option>`);
            }
            loadRooms();
        }

        async function loadRooms() {
            const { data, error } = await supabase.from('rooms').select('*, hostels(name)').order('room_number');
            const tbody = document.getElementById('roomsBody');
            
            if (error) {
                tbody.innerHTML = `<tr><td colspan="5" class="color-waitlisted text-center">Error: ${error.message}</td></tr>`;
                return;
            }
            if (data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <i data-lucide="door-open"></i>
                                <h3>No Rooms Found</h3>
                                <p>Add rooms using the form to start allocating students.</p>
                            </div>
                        </td>
                    </tr>
                `;
                lucide.createIcons();
                return;
            }

            tbody.innerHTML = '';
            data.forEach(r => {
                const isFull = r.occupied_slots >= r.capacity;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:500; color:var(--neutral-900);">${r.hostels.name}</td>
                    <td>${r.room_number}</td>
                    <td>${r.capacity}</td>
                    <td>
                        <span class="badge ${isFull ? 'badge-error' : 'badge-success'}">
                            ${r.occupied_slots} / ${r.capacity}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-danger-solid btn-sm" onclick="deleteRoom('${r.id}')">
                            <i data-lucide="trash-2" class="icon-sm"></i> Delete
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        document.getElementById('addRoomForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('addBtn');
            btn.disabled = true;

            const hostel_id = document.getElementById('r_hostel').value;
            const room_number = document.getElementById('r_number').value;
            const capacity = parseInt(document.getElementById('r_capacity').value);

            const { error } = await supabase.from('rooms').insert([{ hostel_id, room_number, capacity }]);
            if (error) showAlert(error.message);
            else { showAlert('Room added successfully', false); e.target.reset(); loadRooms(); }
            btn.disabled = false;
        });

        window.deleteRoom = async (id) => {
            if(!confirm('Are you sure you want to delete this room?')) return;
            const { error } = await supabase.from('rooms').delete().eq('id', id);
            if(error) showAlert(error.message);
            else { showAlert('Room deleted successfully', false); loadRooms(); }
        }

        init();
    </script>
</body>
</html>
