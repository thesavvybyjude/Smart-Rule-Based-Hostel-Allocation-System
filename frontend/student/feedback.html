<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Feedback | Student</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="main-header">
        <div class="container header-content">
            <a href="/index.html" class="logo">Hostel Allocation</a>
            <nav class="main-nav">
                <a href="/student/dashboard.html">Dashboard</a>
                <a href="/student/feedback.html" style="font-weight:bold;">Submit Feedback</a>
                <a href="/student/view_feedback.html">My Feedback</a>
                <span class="nav-user">Student</span>
            </nav>
        </div>
    </header>
    
    <main class="container main-content">
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <h1>Submit Feedback</h1>
            <p style="margin-bottom:20px;">Use this form to report bugs, request features, or send general feedback to the admins.</p>
            
            <div id="alertBox" class="alert" style="display: none;"></div>
            
            <form id="feedbackForm">
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="subject" required>
                </div>
                
                <div class="form-group">
                    <label>Type</label>
                    <select id="type" required>
                        <option value="bug">Bug Report</option>
                        <option value="error">Error/Issue</option>
                        <option value="suggestion">Suggestion</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="message" rows="5" required></textarea>
                </div>
                
                <button type="submit" id="submitBtn" class="btn btn-primary" style="width:100%;">Submit Feedback</button>
            </form>
        </div>
    </main>

    <script type="module">
        import { supabase } from '/js/supabase-client.js';

        const { data: { session } } = await supabase.auth.getSession();
        if (!session || session.user.email === 'admin@hostel.com') window.location.href = '/index.html';

        const alertBox = document.getElementById('alertBox');
        function showAlert(msg, isError=true) {
            alertBox.style.display = 'block';
            alertBox.className = `alert ${isError ? 'alert-error' : 'alert-success'}`;
            alertBox.textContent = msg;
        }

        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Submitting...';

            const subject = document.getElementById('subject').value;
            const type = document.getElementById('type').value;
            const message = document.getElementById('message').value;

            const { error } = await supabase.from('feedback').insert([{
                student_id: session.user.id,
                subject,
                type,
                message,
                status: 'pending'
            }]);

            if (error) {
                showAlert(error.message);
            } else {
                showAlert('Feedback submitted successfully! Admins will review it soon.', false);
                e.target.reset();
            }
            
            btn.disabled = false;
            btn.textContent = 'Submit Feedback';
        });
    </script>
</body>
</html>
