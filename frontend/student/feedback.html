<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Feedback | Student</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-layout">
        
        <!-- Mobile Overlay -->
        <div class="mobile-overlay" id="mobileOverlay"></div>

        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <a href="/index.html" class="brand">
                <i data-lucide="building-2"></i> AllocationSystem
            </a>
            
            <nav class="sidebar-nav">
                <a href="/student/dashboard.html" class="sidebar-link">
                    <i data-lucide="layout-dashboard" class="icon-md"></i> Dashboard
                </a>
                <a href="/student/feedback.html" class="sidebar-link active">
                    <i data-lucide="message-square-plus" class="icon-md"></i> Submit Feedback
                </a>
                <a href="/student/view_feedback.html" class="sidebar-link">
                    <i data-lucide="history" class="icon-md"></i> My Feedback
                </a>
            </nav>

            <div class="sidebar-bottom">
                <button id="logoutBtn" class="sidebar-link w-full" style="background:transparent; border:none; text-align:left; cursor:pointer;">
                    <i data-lucide="log-out" class="icon-md"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="main-wrapper">
            <!-- Mobile Header -->
            <header class="mobile-header">
                <div class="flex items-center gap-12">
                    <button id="menuToggleBtn" style="background:none; border:none; cursor:pointer;">
                        <i data-lucide="menu" class="icon-lg"></i>
                    </button>
                    <span style="font-weight:600; font-size:var(--text-h5);">Student Portal</span>
                </div>
            </header>

            <main class="main-content">
                <div class="flex items-center justify-between mb-24">
                    <div>
                        <h2>Submit Support Ticket</h2>
                        <p>Report issues or suggest improvements directly to the administration.</p>
                    </div>
                </div>

                <div id="alertBox" class="alert hidden"></div>

                <div class="card" style="max-width: 600px;">
                    <form id="feedbackForm">
                        <div class="form-group">
                            <label class="form-label">Ticket Type</label>
                            <select id="type" class="form-input" required>
                                <option value="bug">Report a Bug/Error</option>
                                <option value="suggestion">Feature Suggestion</option>
                                <option value="other">Other / General Feedback</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Subject</label>
                            <input type="text" id="subject" class="form-input" required placeholder="Brief summary of the issue">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Message Details</label>
                            <textarea id="message" class="form-input" rows="5" required placeholder="Please provide as much detail as possible..."></textarea>
                        </div>

                        <div class="flex items-center gap-16 mt-32">
                            <button type="submit" class="btn btn-primary" id="submitBtn">
                                <i data-lucide="send" class="icon-sm"></i> Submit Ticket
                            </button>
                            <a href="/student/view_feedback.html" class="btn btn-secondary">
                                View My Tickets
                            </a>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { supabase } from '/js/supabase-client.mjs';
        lucide.createIcons();

        // Mobile Menu Toggle
        const menuBtn = document.getElementById('menuToggleBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobileOverlay');

        menuBtn.addEventListener('click', () => {
            sidebar.classList.add('open');
            overlay.classList.add('active');
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        });

        const { data: { session } } = await supabase.auth.getSession();
        if (!session || session.user.email === 'admin@hostel.com') window.location.href = '/index.html';

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = '/login.html';
        });

        const alertBox = document.getElementById('alertBox');
        function showAlert(msg, isError=true) {
            alertBox.classList.remove('hidden', 'alert-success', 'alert-error');
            alertBox.classList.add(isError ? 'alert-error' : 'alert-success');
            alertBox.innerHTML = `<i data-lucide="${isError ? 'alert-circle' : 'check-circle'}" class="icon-sm"></i> ${msg}`;
            lucide.createIcons();
        }

        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="icon-sm" style="animation: spin 2s linear infinite;"></i> Submitting...`;
            
            const type = document.getElementById('type').value;
            const subject = document.getElementById('subject').value;
            const message = document.getElementById('message').value;

            const { error } = await supabase.from('feedback').insert([{
                student_id: session.user.id,
                type,
                subject,
                message
            }]);

            if (error) {
                showAlert('Failed to submit ticket: ' + error.message);
            } else {
                showAlert('Ticket submitted successfully! Administration will review it shortly.', false);
                document.getElementById('feedbackForm').reset();
            }

            btn.disabled = false;
            btn.innerHTML = `<i data-lucide="send" class="icon-sm"></i> Submit Ticket`;
            lucide.createIcons();
        });
    </script>
</body>
</html>
