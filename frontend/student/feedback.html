<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Feedback | Smart Hostel Allocation</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="navbar">
        <div class="container flex items-center justify-between">
            <a href="/index.html" class="brand">
                <i data-lucide="building-2"></i> AllocationSystem
            </a>
            <nav class="navbar-nav">
                <a href="/student/dashboard.html" class="nav-link"><i data-lucide="layout-dashboard" class="icon-sm"></i> Dashboard</a>
                <a href="/student/feedback.html" class="nav-link active"><i data-lucide="message-square-plus" class="icon-sm"></i> Submit Feedback</a>
                <a href="/student/view_feedback.html" class="nav-link"><i data-lucide="history" class="icon-sm"></i> My Feedback</a>
            </nav>
        </div>
    </header>
    
    <main class="container mt-32 mb-48">
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <div class="text-center mb-32 mt-16">
                <i data-lucide="message-square" class="icon-lg mb-8" style="color:var(--primary-600); width:48px; height:48px;"></i>
                <h2>Submit Feedback</h2>
                <p>Report bugs, request features, or send general inquiries.</p>
            </div>
            
            <div id="alertBox" class="alert hidden"></div>
            
            <form id="feedbackForm">
                <div class="form-group">
                    <label class="form-label">Subject</label>
                    <input type="text" id="subject" class="form-input" placeholder="Brief description of the issue" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Type</label>
                    <select id="type" class="form-select" required>
                        <option value="bug">Bug Report</option>
                        <option value="error">Error/Issue</option>
                        <option value="suggestion">Suggestion</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Message</label>
                    <textarea id="message" class="form-textarea" placeholder="Please provide as much detail as possible..." required></textarea>
                </div>
                
                <button type="submit" id="submitBtn" class="btn btn-primary w-full mt-16">
                    <i data-lucide="send" class="icon-sm"></i> Send Feedback
                </button>
            </form>
        </div>
    </main>

    <script type="module">
        import { supabase } from '/js/supabase-client.js';
        lucide.createIcons();

        const { data: { session } } = await supabase.auth.getSession();
        if (!session || session.user.email === 'admin@hostel.com') window.location.href = '/index.html';

        const alertBox = document.getElementById('alertBox');
        function showAlert(msg, isError=true) {
            alertBox.classList.remove('hidden', 'alert-success', 'alert-error');
            alertBox.classList.add(isError ? 'alert-error' : 'alert-success');
            alertBox.innerHTML = `<i data-lucide="${isError ? 'alert-circle' : 'check-circle'}" class="icon-sm"></i> ${msg}`;
            lucide.createIcons();
        }

        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="icon-sm" style="animation: spin 2s linear infinite;"></i> Submitting...`;
            lucide.createIcons();

            const subject = document.getElementById('subject').value;
            const type = document.getElementById('type').value;
            const message = document.getElementById('message').value;

            const { error } = await supabase.from('feedback').insert([{
                student_id: session.user.id,
                subject,
                type,
                message,
                status: 'pending'
            }]);

            if (error) {
                showAlert(error.message);
            } else {
                showAlert('Feedback submitted successfully! Admins will review it soon.', false);
                e.target.reset();
            }
            
            btn.disabled = false;
            btn.innerHTML = `<i data-lucide="send" class="icon-sm"></i> Send Feedback`;
            lucide.createIcons();
        });
    </script>
</body>
</html>
