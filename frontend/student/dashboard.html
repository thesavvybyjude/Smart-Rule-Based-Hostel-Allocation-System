<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Smart Hostel Allocation</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-layout">
        
        <!-- Mobile Overlay -->
        <div class="mobile-overlay" id="mobileOverlay"></div>

        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <a href="/index.html" class="brand">
                <i data-lucide="building-2"></i> AllocationSystem
            </a>
            
            <nav class="sidebar-nav">
                <a href="/student/dashboard.html" class="sidebar-link active">
                    <i data-lucide="layout-dashboard" class="icon-md"></i> Dashboard
                </a>
                <a href="/student/feedback.html" class="sidebar-link">
                    <i data-lucide="message-square-plus" class="icon-md"></i> Submit Feedback
                </a>
                <a href="/student/view_feedback.html" class="sidebar-link">
                    <i data-lucide="history" class="icon-md"></i> My Feedback
                </a>
            </nav>

            <div class="sidebar-bottom">
                <button id="logoutBtn" class="sidebar-link w-full" style="background:transparent; border:none; text-align:left; cursor:pointer;">
                    <i data-lucide="log-out" class="icon-md"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="main-wrapper">
            <!-- Mobile Header -->
            <header class="mobile-header">
                <div class="flex items-center gap-12">
                    <button id="menuToggleBtn" style="background:none; border:none; cursor:pointer;">
                        <i data-lucide="menu" class="icon-lg"></i>
                    </button>
                    <span style="font-weight:600; font-size:var(--text-h5);">Student Portal</span>
                </div>
            </header>

            <main class="main-content">
                <div class="flex items-center justify-between mb-24">
                    <div>
                        <h2 id="welcomeText">Welcome!</h2>
                        <p>View your allocation status and request a hostel.</p>
                    </div>
                </div>

                <div id="alertBox" class="alert hidden"></div>

                <div class="card mb-32" style="background: var(--neutral-900); color: white;">
                    <div class="flex items-center justify-between">
                        <div>
                            <span style="font-size: var(--text-small); color: var(--neutral-400); text-transform: uppercase; letter-spacing: 1px; font-weight: 600;">Current Status</span>
                            <h3 id="allocationStatusText" style="color: white; margin-top: var(--space-4); margin-bottom: 0; font-size: 32px;">Loading...</h3>
                        </div>
                        <i data-lucide="info" class="icon-lg" style="color: var(--neutral-400);"></i>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-24 items-start">
                    <!-- Action Card -->
                    <div class="card" id="actionCard">
                        <div class="empty-state">
                            <i data-lucide="loader-2" class="icon-lg" style="animation: spin 2s linear infinite;"></i>
                            <p class="mt-8">Loading actions...</p>
                        </div>
                    </div>

                    <!-- Details Card -->
                    <div class="card hidden" id="roomDetailsCard">
                        <div class="flex items-center justify-between mb-16 pb-16" style="border-bottom: 1px solid var(--neutral-200);">
                            <h3 style="margin: 0;">Room Details</h3>
                            <span class="badge badge-success">Allocated</span>
                        </div>
                        
                        <div class="flex items-center gap-12 mb-16">
                            <div style="background: var(--primary-50); padding: var(--space-12); border-radius: var(--radius-md);">
                                <i data-lucide="building" class="icon-md" style="color: var(--primary-600);"></i>
                            </div>
                            <div>
                                <span style="display: block; font-size: var(--text-small); color: var(--neutral-500);">Hostel</span>
                                <strong style="font-size: var(--text-body); color: var(--neutral-900);" id="detailHostel">--</strong>
                            </div>
                        </div>

                        <div class="flex items-center gap-12">
                            <div style="background: var(--primary-50); padding: var(--space-12); border-radius: var(--radius-md);">
                                <i data-lucide="door-open" class="icon-md" style="color: var(--primary-600);"></i>
                            </div>
                            <div>
                                <span style="display: block; font-size: var(--text-small); color: var(--neutral-500);">Room Number</span>
                                <strong style="font-size: var(--text-body); color: var(--neutral-900);" id="detailRoom">--</strong>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { supabase } from '/js/supabase-client.mjs';
        lucide.createIcons();

        // Mobile Menu Toggle
        const menuBtn = document.getElementById('menuToggleBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('mobileOverlay');

        menuBtn.addEventListener('click', () => {
            sidebar.classList.add('open');
            overlay.classList.add('active');
        });

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        });

        const { data: { session } } = await supabase.auth.getSession();
        if (!session || session.user.email === 'admin@hostel.com') window.location.href = '/index.html';

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = '/login.html';
        });

        const alertBox = document.getElementById('alertBox');
        function showAlert(msg, isError=true) {
            alertBox.classList.remove('hidden', 'alert-success', 'alert-error');
            alertBox.classList.add(isError ? 'alert-error' : 'alert-success');
            alertBox.innerHTML = `<i data-lucide="${isError ? 'alert-circle' : 'check-circle'}" class="icon-sm"></i> ${msg}`;
            lucide.createIcons();
        }

        const currentUserId = session.user.id;

        async function loadDashboard() {
            const { data: student, error } = await supabase.from('students').select('*').eq('id', currentUserId).single();
            
            if (error) {
                showAlert('Error loading profile: ' + error.message);
                return;
            }

            document.getElementById('welcomeText').textContent = `Welcome, ${student.fullname.split(' ')[0]}!`;
            
            const statusText = document.getElementById('allocationStatusText');
            const actionCard = document.getElementById('actionCard');
            const detailsCard = document.getElementById('roomDetailsCard');

            let formattedStatus = student.allocation_status.replace('_', ' ');
            formattedStatus = formattedStatus.charAt(0).toUpperCase() + formattedStatus.slice(1);
            statusText.textContent = formattedStatus;

            if (student.allocation_status === 'not_requested') {
                actionCard.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="bed"></i>
                        <h3>Request a Hostel</h3>
                        <p>You have not applied for a hostel yet.</p>
                        <button id="requestBtn" class="btn btn-primary mt-16 w-full">Apply Now</button>
                    </div>
                `;
                lucide.createIcons();
                document.getElementById('requestBtn').addEventListener('click', requestHostel);
            } 
            else if (student.allocation_status === 'pending') {
                actionCard.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="clock"></i>
                        <h3>Application Pending</h3>
                        <p>Your request is in the queue. Please wait for the allocation engine to run.</p>
                    </div>
                `;
                lucide.createIcons();
            }
            else if (student.allocation_status === 'waitlisted') {
                actionCard.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="alert-circle" style="color:var(--error-text);"></i>
                        <h3>Waitlisted</h3>
                        <p>Unfortunately, no rooms are currently available for your category.</p>
                    </div>
                `;
                lucide.createIcons();
            }
            else if (student.allocation_status === 'allocated') {
                actionCard.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="check-circle-2" style="color:var(--success-text);"></i>
                        <h3>Congratulations!</h3>
                        <p>You have been allocated a room.</p>
                    </div>
                `;
                lucide.createIcons();

                // Fetch allocation details
                const { data: allocation } = await supabase.from('allocations')
                    .select('rooms(room_number, hostels(name))')
                    .eq('student_id', currentUserId)
                    .single();
                
                if (allocation && allocation.rooms) {
                    detailsCard.classList.remove('hidden');
                    document.getElementById('detailHostel').textContent = allocation.rooms.hostels.name;
                    document.getElementById('detailRoom').textContent = allocation.rooms.room_number;
                }
            }
        }

        async function requestHostel() {
            const btn = document.getElementById('requestBtn');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="icon-sm" style="animation: spin 2s linear infinite;"></i> Processing...`;
            
            const { error } = await supabase.from('students').update({ allocation_status: 'pending' }).eq('id', currentUserId);
            if (error) {
                showAlert('Failed to request hostel: ' + error.message);
                btn.disabled = false;
                btn.innerHTML = `Apply Now`;
            } else {
                showAlert('Hostel requested successfully!', false);
                loadDashboard();
            }
        }

        loadDashboard();
    </script>
</body>
</html>
