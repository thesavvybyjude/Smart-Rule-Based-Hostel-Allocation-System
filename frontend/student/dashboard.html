<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Smart Hostel Allocation</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="navbar">
        <div class="container flex items-center justify-between">
            <a href="/index.html" class="brand">
                <i data-lucide="building-2"></i> AllocationSystem
            </a>
            <nav class="navbar-nav">
                <a href="/student/dashboard.html" class="nav-link active"><i data-lucide="layout-dashboard" class="icon-sm"></i> Dashboard</a>
                <a href="/student/feedback.html" class="nav-link"><i data-lucide="message-square-plus" class="icon-sm"></i> Submit Feedback</a>
                <a href="/student/view_feedback.html" class="nav-link"><i data-lucide="history" class="icon-sm"></i> My Feedback</a>
                <span class="nav-link" style="color:var(--neutral-400);">|</span>
                <button id="logoutBtn" class="btn btn-secondary btn-sm"><i data-lucide="log-out" class="icon-sm"></i> Logout</button>
            </nav>
        </div>
    </header>
    
    <main class="container mt-32 mb-48">
        <div class="flex items-center justify-between mb-24">
            <div>
                <h2>Student Dashboard</h2>
                <p>Welcome back, <span id="studentName" style="font-weight:600; color:var(--neutral-900);">Student</span>.</p>
            </div>
            <button id="requestBtn" class="btn btn-primary hidden">
                <i data-lucide="send" class="icon-sm"></i> Request Hostel
            </button>
        </div>

        <div id="alertBox" class="alert hidden"></div>

        <div class="card text-center pb-48 pt-48" id="statusCard">
            <i id="statusIcon" data-lucide="loader-2" class="icon-lg" style="animation: spin 2s linear infinite; width:48px; height:48px; margin-bottom:var(--space-16); color:var(--neutral-400);"></i>
            <h2 id="statusTitle">Loading Status...</h2>
            <p id="statusDesc" class="mt-8">Please wait while we fetch your allocation status.</p>
        </div>

        <div id="allocationDetails" class="card hidden mt-24">
            <h3 class="mb-16 flex items-center gap-8"><i data-lucide="map-pin" class="icon-sm"></i> Allocation Details</h3>
            <div class="grid grid-cols-2 gap-16">
                <div>
                    <label class="form-label">Hostel</label>
                    <p id="allocHostel" style="font-weight:500; color:var(--neutral-900);">--</p>
                </div>
                <div>
                    <label class="form-label">Room</label>
                    <p id="allocRoom" style="font-weight:500; color:var(--neutral-900);">--</p>
                </div>
                <div>
                    <label class="form-label">Date Allocated</label>
                    <p id="allocDate">--</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from '/js/supabase-client.js';
        lucide.createIcons();

        let currentUserId = null;

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = '/login.html';
        });

        const alertBox = document.getElementById('alertBox');
        function showAlert(msg, isError=true) {
            alertBox.classList.remove('hidden', 'alert-success', 'alert-error');
            alertBox.classList.add(isError ? 'alert-error' : 'alert-success');
            alertBox.innerHTML = `<i data-lucide="${isError ? 'alert-circle' : 'check-circle'}" class="icon-sm"></i> ${msg}`;
            lucide.createIcons();
        }

        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session || session.user.email === 'admin@hostel.com') {
                window.location.href = '/index.html';
                return;
            }
            currentUserId = session.user.id;

            const { data: student, error } = await supabase.from('students').select('*').eq('id', currentUserId).single();
            if (error) {
                showAlert('Error loading profile: ' + error.message);
                return;
            }

            document.getElementById('studentName').textContent = student.fullname;
            updateStatusUI(student.allocation_status);

            if (student.allocation_status === 'allocated') {
                const { data: alloc } = await supabase.from('allocations')
                    .select('*, rooms(room_number, hostels(name))')
                    .eq('student_id', currentUserId)
                    .single();
                
                if (alloc) {
                    document.getElementById('allocationDetails').classList.remove('hidden');
                    document.getElementById('allocHostel').textContent = alloc.rooms.hostels.name;
                    document.getElementById('allocRoom').textContent = alloc.rooms.room_number;
                    document.getElementById('allocDate').textContent = new Date(alloc.date_allocated).toLocaleDateString();
                }
            }
        }

        function updateStatusUI(status) {
            const card = document.getElementById('statusCard');
            const icon = document.getElementById('statusIcon');
            const title = document.getElementById('statusTitle');
            const desc = document.getElementById('statusDesc');
            const btn = document.getElementById('requestBtn');

            card.className = 'card text-center pb-48 pt-48';
            btn.classList.add('hidden');

            if (status === 'not_requested') {
                icon.setAttribute('data-lucide', 'inbox');
                icon.style = "width:48px; height:48px; margin-bottom:var(--space-16); color:var(--neutral-500);";
                title.textContent = 'Not Requested';
                desc.textContent = 'You have not requested a hostel allocation yet.';
                btn.classList.remove('hidden');
            } else if (status === 'pending') {
                card.style.borderColor = 'var(--warning-border)';
                card.style.backgroundColor = 'var(--warning-bg)';
                icon.setAttribute('data-lucide', 'clock');
                icon.style = "width:48px; height:48px; margin-bottom:var(--space-16); color:var(--warning-text);";
                title.textContent = 'Request Pending';
                desc.textContent = 'Your request has been received and is awaiting the allocation algorithm.';
            } else if (status === 'allocated') {
                card.style.borderColor = 'var(--success-border)';
                card.style.backgroundColor = 'var(--success-bg)';
                icon.setAttribute('data-lucide', 'check-circle-2');
                icon.style = "width:48px; height:48px; margin-bottom:var(--space-16); color:var(--success-text);";
                title.textContent = 'Hostel Allocated';
                desc.textContent = 'Congratulations! You have been successfully allocated a room.';
            } else if (status === 'waitlisted') {
                card.style.borderColor = 'var(--error-border)';
                card.style.backgroundColor = 'var(--error-bg)';
                icon.setAttribute('data-lucide', 'alert-circle');
                icon.style = "width:48px; height:48px; margin-bottom:var(--space-16); color:var(--error-text);";
                title.textContent = 'Waitlisted';
                desc.textContent = 'Unfortunately, there were no available rooms matching your criteria.';
            }
            lucide.createIcons();
        }

        document.getElementById('requestBtn').addEventListener('click', async () => {
            const btn = document.getElementById('requestBtn');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="icon-sm" style="animation: spin 2s linear infinite;"></i> Requesting...`;
            lucide.createIcons();

            const { error } = await supabase.from('students').update({ allocation_status: 'pending' }).eq('id', currentUserId);
            if (error) {
                showAlert(error.message);
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="send" class="icon-sm"></i> Request Hostel`;
                lucide.createIcons();
            } else {
                updateStatusUI('pending');
                showAlert('Request submitted successfully!', false);
            }
        });

        init();
    </script>
</body>
</html>
