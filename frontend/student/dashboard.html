<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Smart Rule-Based Hostel Allocation System</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .status-not_requested { background-color: #e2e8f0; color: #475569; }
        .status-pending { background-color: #fef08a; color: #854d0e; }
        .status-allocated { background-color: #bbf7d0; color: #166534; }
        .status-waitlisted { background-color: #fecaca; color: #991b1b; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container header-content">
            <a href="/index.html" class="logo">Hostel Allocation</a>
            <nav class="main-nav" id="mainNav">
                <a href="/student/dashboard.html" style="font-weight:bold;">Dashboard</a>
                <span class="nav-user" id="welcomeText">Loading...</span>
                <button id="logoutBtn" class="btn-logout" style="background:none; border:none; cursor:pointer;">Logout</button>
            </nav>
        </div>
    </header>
    
    <main class="container main-content">
        <div id="alertBox" class="alert" style="display: none;"></div>

        <div class="dashboard-grid">
            <div class="card">
                <h2>My Profile</h2>
                <div id="profileLoading">Loading profile...</div>
                <table class="data-table" id="profileTable" style="display:none; margin-top:15px;">
                    <tbody>
                        <tr><th>Full Name</th><td id="p-name"></td></tr>
                        <tr><th>Email</th><td id="p-email"></td></tr>
                        <tr><th>Gender</th><td id="p-gender"></td></tr>
                        <tr><th>Level</th><td id="p-level"></td></tr>
                        <tr><th>Medical Priority</th><td id="p-medical"></td></tr>
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h2>Allocation Status</h2>
                <div id="statusLoading">Loading status...</div>
                <div id="statusContainer" style="display:none; text-align:center; padding: 20px 0;">
                    <p style="font-size: 1.2rem; margin-bottom: 10px;">
                        Status: <span id="s-badge" class="status-badge"></span>
                    </p>
                    <div id="actionContainer" style="margin-top: 20px;"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from '/js/supabase-client.js';

        // Session Check
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            window.location.href = '/login.html';
        } else if (session.user.email === 'admin@hostel.com') {
            window.location.href = '/admin/dashboard.html';
        }

        const user = session.user;

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = '/login.html';
        });

        const alertBox = document.getElementById('alertBox');
        function showAlert(message, isError = true) {
            alertBox.style.display = 'block';
            alertBox.className = `alert ${isError ? 'alert-error' : 'alert-success'}`;
            alertBox.textContent = message;
        }

        async function loadProfile() {
            const { data: student, error } = await supabase
                .from('students')
                .select('*')
                .eq('id', user.id)
                .single();

            if (error) {
                showAlert('Failed to load profile details.');
                document.getElementById('profileLoading').textContent = 'Error loading data.';
                document.getElementById('statusLoading').textContent = 'Error loading data.';
                return;
            }

            document.getElementById('welcomeText').textContent = `Welcome, ${student.fullname}`;

            // Populate Profile
            document.getElementById('profileLoading').style.display = 'none';
            document.getElementById('profileTable').style.display = 'table';
            document.getElementById('p-name').textContent = student.fullname;
            document.getElementById('p-email').textContent = student.email;
            document.getElementById('p-gender').textContent = student.gender;
            document.getElementById('p-level').textContent = student.level + ' Level';
            document.getElementById('p-medical').textContent = student.medical_status ? 'Yes' : 'No';

            // Populate Status
            document.getElementById('statusLoading').style.display = 'none';
            document.getElementById('statusContainer').style.display = 'block';
            
            const badge = document.getElementById('s-badge');
            badge.textContent = student.allocation_status.replace('_', ' ');
            badge.className = `status-badge status-${student.allocation_status}`;

            const actionContainer = document.getElementById('actionContainer');
            actionContainer.innerHTML = '';

            if (student.allocation_status === 'not_requested') {
                const btn = document.createElement('button');
                btn.className = 'btn btn-primary';
                btn.textContent = 'Submit Hostel Request';
                btn.onclick = async () => {
                    btn.disabled = true;
                    btn.textContent = 'Submitting...';
                    const { error: updateError } = await supabase
                        .from('students')
                        .update({ allocation_status: 'pending' })
                        .eq('id', user.id);
                    
                    if (updateError) {
                        showAlert('Failed to submit request.');
                        btn.disabled = false;
                        btn.textContent = 'Submit Hostel Request';
                    } else {
                        showAlert('Request submitted successfully!', false);
                        loadProfile(); // Reload
                    }
                };
                actionContainer.appendChild(btn);
            } else if (student.allocation_status === 'allocated') {
                // Fetch allocation details
                const { data: allocation } = await supabase
                    .from('allocations')
                    .select('*, rooms(room_number, hostels(name))')
                    .eq('student_id', user.id)
                    .single();
                
                if (allocation && allocation.rooms) {
                    actionContainer.innerHTML = `
                        <div style="background: #f8fafc; padding: 15px; border-radius: 5px; border: 1px solid #e2e8f0; text-align: left;">
                            <h3 style="margin-top:0; color:#334155;">Your Room Details</h3>
                            <p><strong>Hostel:</strong> ${allocation.rooms.hostels.name}</p>
                            <p><strong>Room Number:</strong> ${allocation.rooms.room_number}</p>
                        </div>
                    `;
                }
            } else if (student.allocation_status === 'pending') {
                actionContainer.innerHTML = '<p style="color:#64748b;">Your request is pending. Please check back later after allocations are run.</p>';
            }
        }

        loadProfile();
    </script>
</body>
</html>
