<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Rule-Based Hostel Allocation System for tertiary institutions">
    <title>Register | Smart Rule-Based Hostel Allocation System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="main-header">
        <div class="container header-content">
            <a href="/index.html" class="logo">Hostel Allocation System</a>
        </div>
    </header>
    
    <main class="container main-content">
        <div class="form-container">
            <div class="card">
                <h1 class="page-title">Student Registration</h1>
                
                <div id="alertBox" class="alert" style="display: none;"></div>
                
                <form id="registerForm">
                    <div class="form-group">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" name="fullname" required minlength="3">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required minlength="6">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm_password">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" required minlength="6">
                    </div>
                    
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" name="gender" required>
                            <option value="">-- Select Gender --</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="level">Level</label>
                        <select id="level" name="level" required>
                            <option value="">-- Select Level --</option>
                            <option value="100">100 Level</option>
                            <option value="200">200 Level</option>
                            <option value="300">300 Level</option>
                            <option value="400">400 Level</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="medical_status" name="medical_status">
                            I have a medical condition (Priority allocation)
                        </label>
                    </div>
                    
                    <button type="submit" id="submitBtn" class="btn btn-primary" style="width:100%;">Register</button>
                </form>
                
                <p style="text-align:center; margin-top:15px;">
                    Already have an account? <a href="/login.html">Login here</a>
                </p>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from '/js/supabase-client.js';

        // Redirect if already logged in
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            window.location.href = '/index.html';
        }

        const registerForm = document.getElementById('registerForm');
        const alertBox = document.getElementById('alertBox');
        const submitBtn = document.getElementById('submitBtn');

        function showAlert(message, isError = true) {
            alertBox.style.display = 'block';
            alertBox.className = `alert ${isError ? 'alert-error' : 'alert-success'}`;
            alertBox.innerHTML = message;
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Registering...';
            alertBox.style.display = 'none';

            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const gender = document.getElementById('gender').value;
            const level = parseInt(document.getElementById('level').value);
            const medicalStatus = document.getElementById('medical_status').checked;

            if (password !== confirmPassword) {
                showAlert('Passwords do not match.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register';
                return;
            }

            if (email === 'admin@hostel.com') {
                showAlert('This email address is reserved.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register';
                return;
            }

            // 1. Sign up with Supabase Auth
            const { data: authData, error: authError } = await supabase.auth.signUp({
                email: email,
                password: password,
            });

            if (authError) {
                showAlert(authError.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register';
                return;
            }

            // 2. Insert additional data into 'students' table
            if (authData.user) {
                const { error: dbError } = await supabase.from('students').insert({
                    id: authData.user.id,
                    email: email,
                    fullname: fullname,
                    gender: gender,
                    level: level,
                    medical_status: medicalStatus,
                    allocation_status: 'not_requested'
                });

                if (dbError) {
                    showAlert('Account created but failed to save details: ' + dbError.message);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Register';
                    return;
                }

                showAlert('Registration successful! You can now <a href="/login.html">log in</a>.', false);
                registerForm.reset();
            }

            submitBtn.disabled = false;
            submitBtn.textContent = 'Register';
        });
    </script>
</body>
</html>
