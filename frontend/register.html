<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Smart Hostel Allocation</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .auth-container { max-width: 500px; margin: var(--space-64) auto; }
        .auth-header { text-align: center; margin-bottom: var(--space-32); }
        .auth-header svg { width: 48px; height: 48px; color: var(--primary-600); margin-bottom: var(--space-16); }
    </style>
</head>
<body class="flex items-center justify-center" style="min-height: 100vh; background-color: var(--neutral-100); padding: var(--space-24) 0;">

    <div class="auth-container w-full">
        <div class="auth-header">
            <i data-lucide="user-plus"></i>
            <h2>Create Account</h2>
            <p>Register for hostel allocation</p>
        </div>

        <div class="card">
            <div id="alertBox" class="alert hidden"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="fullname" class="form-input" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-input" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" minlength="6" required>
                </div>

                <div class="grid grid-cols-2 gap-16">
                    <div class="form-group">
                        <label class="form-label">Gender</label>
                        <select id="gender" class="form-select" required>
                            <option value="">Select...</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Academic Level</label>
                        <select id="level" class="form-select" required>
                            <option value="">Select...</option>
                            <option value="100">100 Level</option>
                            <option value="200">200 Level</option>
                            <option value="300">300 Level</option>
                            <option value="400">400 Level</option>
                        </select>
                    </div>
                </div>

                <div class="form-group mt-8">
                    <label class="flex items-center gap-8 cursor-pointer">
                        <input type="checkbox" id="medical_status" style="width:16px; height:16px;">
                        <span class="form-label" style="margin:0;">I have a special medical condition (Priority Allocation)</span>
                    </label>
                </div>
                
                <button type="submit" id="regBtn" class="btn btn-primary w-full mt-24">
                    <i data-lucide="user-check" class="icon-sm"></i> Create Account
                </button>
            </form>

            <div class="mt-24 text-center">
                <small>Already have an account? <a href="/login.html">Sign in</a></small>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from '/js/supabase-client.js';

        lucide.createIcons();

        const { data: { session } } = await supabase.auth.getSession();
        if (session) { window.location.href = '/index.html'; }

        const alertBox = document.getElementById('alertBox');
        function showAlert(msg, isError = true) {
            alertBox.classList.remove('hidden', 'alert-success', 'alert-error');
            alertBox.classList.add(isError ? 'alert-error' : 'alert-success');
            alertBox.innerHTML = `<i data-lucide="${isError ? 'alert-circle' : 'check-circle'}" class="icon-sm"></i> ${msg}`;
            lucide.createIcons();
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="icon-sm" style="animation: spin 2s linear infinite;"></i> Creating Account...`;
            lucide.createIcons();

            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const gender = document.getElementById('gender').value;
            const level = parseInt(document.getElementById('level').value);
            const medical_status = document.getElementById('medical_status').checked;

            const { data: authData, error: authError } = await supabase.auth.signUp({ email, password });

            if (authError) {
                showAlert(authError.message);
                resetBtn();
                return;
            }

            if (authData.user) {
                const { error: dbError } = await supabase.from('students').insert([{
                    id: authData.user.id,
                    email,
                    fullname,
                    gender,
                    level,
                    medical_status,
                    allocation_status: 'not_requested'
                }]);

                if (dbError) {
                    showAlert('Registration failed at database level: ' + dbError.message);
                } else {
                    showAlert('Registration successful! Redirecting...', false);
                    setTimeout(() => window.location.href = '/index.html', 1500);
                    return;
                }
            }
            resetBtn();

            function resetBtn() {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="user-check" class="icon-sm"></i> Create Account`;
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
